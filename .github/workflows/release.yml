name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package dist
        run: tar -czf frontend-dist.tar.gz -C dist .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend-dist.tar.gz
          generate_release_notes: true
