name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  publish-latest:
    name: Publish Latest
    needs: test-and-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Write version file
        run: |
          cat > public/version.json <<EOF
          {"commit":"${{ github.sha }}","date":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
      - run: npm run build
      - name: Package dist
        run: tar -czf frontend-dist.tar.gz -C dist .
      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: |
            frontend-dist.tar.gz
            dist/version.json
          body: |
            Rolling release — automatically built from the latest `main` commit.

            **Commit:** `${{ github.sha }}`
            **Date:** ${{ github.event.head_commit.timestamp }}

            Run `scripts/update_frontend.sh` in the main repository to update.
      - name: Notify main repository to sync frontend
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
        run: |
          gh api repos/HuangYuChuh/ComfyUI_Skills_OpenClaw/dispatches \
            -f event_type='frontend_release_published' \
            -F client_payload[frontend_repo]="${{ github.repository }}" \
            -F client_payload[frontend_sha]="${{ github.sha }}"
